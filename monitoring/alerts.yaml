apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: billing-api-alerts
  labels:
    app.kubernetes.io/name: billing-api
    release: prometheus
spec:
  groups:
    - name: billing-api.availability
      rules:
        - alert: billing-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="billing-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="billing-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Payments
          annotations:
            summary: billing-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: billing-apiUnavailable
          expr: up{job="billing-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Payments
          annotations:
            summary: billing-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
